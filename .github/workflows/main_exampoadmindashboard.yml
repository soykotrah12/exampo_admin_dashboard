# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - exampoAdminDashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          include-hidden-files: true
          path: |
            .next
            node_modules
            package.json
            package-lock.json
            next.config.mjs
            server.mjs
            public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A1F6CB8F54354031B22CE5E7BB081FE1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8192262D385147AFA85DE5C137E81904 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_788208FEE54A4865A9714B629A4E8C92 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'exampoAdminDashboard'
          slot-name: 'Production'
          package: .

      - name: Configure Azure startup command
        uses: azure/cli@v2
        with:
          inlineScript: |
            RESOURCE_GROUP=$(az webapp list --query "[?name=='exampoAdminDashboard'].resourceGroup | [0]" -o tsv)
            az webapp config set --resource-group "$RESOURCE_GROUP" --name "exampoAdminDashboard" --startup-file "node server.mjs"
          
